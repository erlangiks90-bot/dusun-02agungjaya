<!DOCTYPE html>
<html lang="id">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Login SIDUS</title><link rel="stylesheet" href="/css/style.css"></head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">🏛️</div><h1>Login SIDUS</h1><p>Dusun 02 Desa Agung Jaya</p>
    <label>Jenis Pengguna</label><select id="role"><option value="kadus">Kadus</option><option value="rt">RT</option><option value="masyarakat">Masyarakat</option></select>
    <label>Username / NIK</label><input id="username" placeholder="Masukkan username atau NIK">
    <label>Password</label><input id="password" type="password" placeholder="Masukkan password">
    <button class="btn full" onclick="login()">Masuk</button><p id="msg" class="msg"></p><a href="/" class="back-link">← Kembali ke Beranda</a>
  </div>
<script src="/js/login.js"></script>
</body></html>
