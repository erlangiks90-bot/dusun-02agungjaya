<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Data Warga</title><link rel="stylesheet" href="/css/fast.css"></head><body><header class="top"><div><h1>Data Warga</h1><p id="userText">Memuat...</p></div><button class="btn gray" onclick="location.href=dashUrl(USER)">Dashboard</button></header><main class="wrap"><section class="panel" id="statBox">Memuat statistik...</section><section class="panel" id="formBox"><h3>Tambah / Edit Warga</h3><input type="hidden" id="edit_id"><div class="row"><input id="nik" placeholder="NIK"><input id="no_kk" placeholder="No KK"></div><input id="nama" placeholder="Nama lengkap"><div class="row"><input id="tempat_lahir" placeholder="Tempat lahir"><input id="tanggal_lahir" type="date"></div><div class="row"><select id="jenis_kelamin"><option value="">Jenis kelamin</option><option>Laki-laki</option><option>Perempuan</option></select><select id="agama"><option value="">Agama</option><option>Islam</option><option>Kristen</option><option>Katolik</option><option>Hindu</option><option>Buddha</option><option>Konghucu</option></select></div><div class="row"><input id="pendidikan" placeholder="Pendidikan"><input id="pekerjaan" placeholder="Pekerjaan"></div><div class="row"><input id="status_perkawinan" placeholder="Status perkawinan"><input id="hubungan_keluarga" placeholder="Hubungan keluarga"></div><div class="row"><input id="golongan_darah" placeholder="Golongan darah"><input id="no_hp" placeholder="No HP"></div><input id="alamat" placeholder="Alamat"><select id="rt"><option value="06">RT 06</option><option value="07">RT 07</option><option value="08">RT 08</option></select><div class="row"><button class="btn" onclick="saveWarga()">Simpan</button><button class="btn gray" onclick="resetForm()">Bersihkan</button></div></section><section class="panel"><div class="row"><input id="cari" placeholder="Cari nama/NIK/KK/HP" oninput="render()"><select id="filterRt" onchange="render()"><option value="">Semua RT</option><option value="06">RT 06</option><option value="07">RT 07</option><option value="08">RT 08</option></select></div></section><section class="table-wrap"><table class="table"><thead><tr><th>NIK</th><th>Nama</th><th>RT</th><th>TTL</th><th>Umur</th><th>Pekerjaan</th><th>Aksi</th></tr></thead><tbody id="tbody"><tr><td colspan="7">Memuat...</td></tr></tbody></table></section></main><script src="/js/fast-common.js"></script><script src="/js/warga-fast.js"></script></body></html>
