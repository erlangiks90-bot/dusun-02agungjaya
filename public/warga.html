<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Data Warga</title><link rel="stylesheet" href="/css/fast.css"></head><body><header class="top"><div><h1>Data Warga</h1><p id="userText">Memuat...</p></div><button class="btn gray" onclick="history.back()">Kembali</button></header><main class="wrap"><section class="panel" id="formBox"><h3>Tambah Warga</h3><div class="row"><input id="nik" placeholder="NIK"><input id="no_kk" placeholder="No KK"></div><input id="nama" placeholder="Nama lengkap"><div class="row"><input id="tempat_lahir" placeholder="Tempat lahir"><input id="tanggal_lahir" type="date"></div><div class="row"><select id="jenis_kelamin"><option value="">Jenis kelamin</option><option>Laki-laki</option><option>Perempuan</option></select><input id="pekerjaan" placeholder="Pekerjaan"></div><input id="alamat" placeholder="Alamat"><select id="rt"><option value="06">RT 06</option><option value="07">RT 07</option><option value="08">RT 08</option></select><button class="btn" onclick="saveWarga()">Simpan</button></section><section class="panel"><div class="row"><input id="cari" placeholder="Cari nama/NIK/KK" oninput="render()"><select id="filterRt" onchange="render()"><option value="">Semua RT</option><option value="06">RT 06</option><option value="07">RT 07</option><option value="08">RT 08</option></select></div></section><section class="table-wrap"><table class="table"><thead><tr><th>NIK</th><th>Nama</th><th>RT</th><th>Lahir</th><th>Umur</th></tr></thead><tbody id="tbody"><tr><td colspan="5">Memuat...</td></tr></tbody></table></section></main><script src="/js/fast-common.js"></script><script src="/js/warga-fast.js"></script></body></html>
