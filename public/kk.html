<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OCR KK</title><link rel="stylesheet" href="/css/fast.css"></head><body><header class="top"><div><h1>Scan KK OCR</h1><p id="userText">Memuat...</p></div><button class="btn gray" onclick="history.back()">Kembali</button></header><main class="wrap"><section class="panel ocr-box"><h3>Upload / Scanner Foto KK</h3><p class="mini">Foto KK harus terang dan lurus agar hasil lebih akurat.</p><input id="fotoKK" type="file" accept="image/*" capture="environment"><button class="btn" onclick="scanKK()">Scan KK</button><p id="ocrMsg"></p></section><section id="preview" class="panel hide"><h3>Preview Hasil OCR</h3><input id="no_kk" placeholder="No KK"><input id="kepala_keluarga" placeholder="Kepala Keluarga"><input id="alamat" placeholder="Alamat"><select id="rt"><option value="06">RT 06</option><option value="07">RT 07</option><option value="08">RT 08</option></select><h3>Anggota Keluarga</h3><div id="anggotaBox"></div><button class="btn blue" onclick="tambahAnggota()">+ Tambah Anggota</button><button class="btn" onclick="simpanKeWarga()">Simpan ke Data Warga</button></section></main><script src="/js/fast-common.js"></script><script src="/js/ocr-kk.js"></script></body></html>
